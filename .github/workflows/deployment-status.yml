name: Deployment Status

on:
  push:
    branches: [ main ]

jobs:
  pre-deployment:
    name: pre-deployment
    runs-on: ubuntu-latest
    outputs:
      issue-number: ${{ steps.create-issue.outputs.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Get package version
        id: package-version
        run: echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Get previous commit SHA
        id: previous-commit
        run: echo "sha=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

      - name: Create deployment issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${context.sha}`,
              labels: ['deployment', 'in-progress'],
              body: `Deployment in progress for commit: ${context.sha}\nPrevious commit: ${{ steps.previous-commit.outputs.sha }}\nPackage version: ${{ steps.package-version.outputs.version }}`
            });
            return issue.number;

      - name: Post pre-deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create-issue.outputs.result }},
              body: "Pre-deployment checks completed"
            });

  rollback-preparation:
    name: rollback-preparation
    needs: pre-deployment
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.rollback-package.outputs.artifact_name }}
      checksum: ${{ steps.rollback-package.outputs.checksum }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get package version
        id: package-version
        run: echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Get previous commit SHA
        id: previous-commit
        run: echo "sha=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

      - name: Create rollback script
        run: |
          cat > rollback.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "Starting rollback to commit: ${{ steps.previous-commit.outputs.sha }}"
          git checkout ${{ steps.previous-commit.outputs.sha }}
          npm ci
          echo "Rollback completed successfully"
          EOF
          chmod +x rollback.sh

      - name: Create configuration backups
        run: |
          mkdir -p rollback-backups
          cp package.json rollback-backups/
          cp package-lock.json rollback-backups/
          if [ -f .env.example ]; then cp .env.example rollback-backups/; fi

      - name: Create dependency verification script
        run: |
          cat > verify-dependencies.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "Verifying dependencies..."
          npm audit
          echo "Dependencies verified successfully"
          EOF
          chmod +x verify-dependencies.sh

      - name: Create rollback documentation
        run: |
          cat > ROLLBACK_GUIDE.md << 'EOF'
          # Rollback Guide

          ## Step-by-Step Instructions

          1. Stop the application: `pm2 stop app` (or appropriate command for your setup)
          2. Download and extract the rollback artifact
          3. Run the rollback script: `./rollback.sh`
          4. Verify dependencies: `./verify-dependencies.sh`
          5. Start the application: `pm2 start app`
          6. Verify application health: `curl http://localhost:3000/health` (adjust URL as needed)

          ## Rollback Artifacts Included
          - Rollback execution script: `rollback.sh`
          - Configuration backups: `rollback-backups/` (package.json, package-lock.json, .env.example if exists)
          - Dependency verification script: `verify-dependencies.sh`
          - This rollback guide: `ROLLBACK_GUIDE.md`
          EOF

      - name: Create compressed rollback package
        id: rollback-package
        run: |
          ARTIFACT_NAME="rollback-package-${{ github.sha }}"
          tar -czf "$ARTIFACT_NAME.tar.gz" rollback.sh verify-dependencies.sh rollback-backups/ ROLLBACK_GUIDE.md
          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          echo "checksum=$(sha256sum "$ARTIFACT_NAME.tar.gz" | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Upload rollback artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rollback-package.outputs.artifact_name }}
          path: ${{ steps.rollback-package.outputs.artifact_name }}.tar.gz
          retention-days: 30

      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              body: `## 🔄 Rollback Plan Ready

            - Previous Commit: ${{ steps.previous-commit.outputs.sha }}
            - Current Commit: ${{ github.sha }}
            - Package Version: ${{ steps.package-version.outputs.version }}
            - Artifact: ${{ steps.rollback-package.outputs.artifact_name }}

            ✅ Rollback script created with error handling
            ✅ Configuration backups (package.json, package-lock.json, environment templates) completed
            ✅ Dependency verification script for compatibility checking created
            ✅ Detailed rollback documentation with step-by-step instructions generated
            ✅ Compressed rollback package with SHA256 checksum created

            ### Quick Rollback Command
            \`\`\`bash
            # After downloading the artifact from GitHub Actions:
            tar -xzf ${{ steps.rollback-package.outputs.artifact_name }}.tar.gz
            ./rollback.sh
            \`\`\`

            - Rollback script created: true
            - Configuration backup: true
            - SHA256: ${{ steps.rollback-package.outputs.checksum }}`
            });

  post-deployment:
    name: post-deployment
    needs: rollback-preparation
    runs-on: ubuntu-latest
    steps:
      - name: Update issue labels
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              name: 'in-progress'
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              labels: ['completed']
            });

      - name: Post final comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              body: `Deployment Completed Successfully

            Rollback artifact details:
            - Artifact Name: ${{ needs.rollback-preparation.outputs.artifact_name }}
            - SHA256 Checksum: ${{ needs.rollback-preparation.outputs.checksum }}
            - Retention Period: 30 days

            The rollback package is available in the GitHub Actions artifacts for this run.`
            });

      - name: Close deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              state: 'closed'
            });
